<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Assistant</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Sessions">
        <div class="brand">
          <div>
            <h1>Personal Assistant</h1>
            <p id="status">Checking service...</p>
          </div>
        </div>

        <label class="field">
          <span>User</span>
          <input id="userId" autocomplete="username" value="me" />
        </label>

        <div class="actions">
          <button id="newSession" type="button">New Session</button>
          <button id="refreshSessions" type="button">Refresh</button>
        </div>

        <nav id="sessions" class="sessions" aria-label="Session list"></nav>
      </aside>

      <section class="workspace" aria-label="Chat">
        <header class="toolbar">
          <div>
            <span class="eyebrow">Session</span>
            <strong id="sessionTitle">No session selected</strong>
          </div>
          <code id="sessionId">auto-create on send</code>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <textarea id="message" rows="3" placeholder="Ask something or tell the assistant what to remember"></textarea>
          <button id="send" type="submit">Send</button>
        </form>

        <details class="details">
          <summary>Last response details</summary>
          <pre id="details">{}</pre>
        </details>
      </section>
    </main>
    <script src="/web/app.js" defer></script>
  </body>
</html>
