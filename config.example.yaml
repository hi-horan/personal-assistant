http_addr: ":8080"
app_name: personal-assistant
printconfig: false
database_url: "postgres://postgres:postgres@localhost:5432/personal_assistant?sslmode=disable"
log_level: info

# echo is useful for local wiring tests. Use gemini for real model calls.
model_provider: echo
gemini_model: gemini-2.5-flash
gemini_api_key: ""

# hash is local and deterministic. Use gemini for semantic embeddings in production.
embedding_provider: hash
embedding_model: text-embedding-004
embedding_dimension: 768

# Optional OpenTelemetry OTLP HTTP endpoint, for example http://localhost:4318
otel_service_name: personal-assistant
otel_exporter_otlp_endpoint: ""
otel_metrics_endpoint: ""

mcp:
  servers: []
