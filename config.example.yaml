http_addr: ":8080"
app_name: personal-assistant
printconfig: false
instruction: |
  你是一个简洁、可靠的个人助手。
  请优先使用当前会话历史、会话摘要和长期记忆中与问题相关的信息。
  不要编造记忆；如果记忆缺失或不确定，请基于用户当前消息直接回答。

database_url: "postgres://postgres:postgres@localhost:5432/personal_assistant?sslmode=disable"
log_level: info

model_provider: echo

providers:
  echo:
    type: echo
    model: echo
  gemini:
    type: gemini
    model: gemini-2.5-flash
    api_key: ""
  anthropic:
    type: anthropic
    model: claude-sonnet-4-5
    api_key: ""
    base_url: "https://api.anthropic.com"
    reasoning_effort: ""
  openai:
    type: openai_compat
    model: gpt-4o
    api_key: ""
    base_url: "https://api.openai.com/v1"
    reasoning_effort: ""
  glm:
    type: openai_compat
    model: glm-4.6v
    api_key: ""
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    thinking_type: ""
  dashscope:
    type: openai_compat
    model: qwen-plus
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  deepseek:
    type: openai_compat
    model: deepseek-chat
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
  ollama:
    type: openai_compat
    model: llama3.1
    base_url: "http://localhost:11434/v1"

# Legacy fields remain supported for compatibility.
gemini_model: gemini-2.5-flash
gemini_api_key: ""
glm_model: glm-4.6v
glm_api_key: ""
glm_base_url: "https://open.bigmodel.cn/api/paas/v4"
glm_thinking_type: ""
bigmodel_api_key: ""
bigmodel_base_url: "https://open.bigmodel.cn/api/paas/v4"

embedding_provider: hash
embedding_model: text-embedding-004
embedding_dimension: 1024

otel_service_name: personal-assistant
otel_exporter_otlp_endpoint: ""
otel_metrics_endpoint: ""

mcp:
  servers: []
